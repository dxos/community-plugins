name: Validate manifest

on:
  pull_request:
    paths:
      - 'community-plugins.json'
      - 'schema/**'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]

jobs:
  schema:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install --global ajv-cli@5 ajv-formats@3
      - name: Validate community-plugins.json
        run: ajv validate --spec=draft2020 -s schema/community-plugins.schema.json -d community-plugins.json --strict=false

  entries:
    name: Release-asset validation
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check each listed repo has a release with required assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/validate-entries.mjs
